<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- 背景 -->
  <rect width="64" height="64" rx="12" fill="#0066cc"/>

  <!-- グリッド線（薄く） -->
  <line x1="32" y1="4"  x2="32" y2="60" stroke="white" stroke-width="0.8" stroke-opacity="0.2"/>
  <line x1="4"  y1="32" x2="60" y2="32" stroke="white" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- スプライン曲線（3次曲線っぽい滑らかなパス） -->
  <path d="M 8 44 C 16 44, 18 14, 28 20 C 38 26, 38 46, 48 24 C 52 16, 56 18, 58 16"
        fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 制御点（補間点） -->
  <circle cx="8"  cy="44" r="3" fill="white"/>
  <circle cx="28" cy="20" r="3" fill="white"/>
  <circle cx="48" cy="24" r="3" fill="white"/>
  <circle cx="58" cy="16" r="3" fill="white"/>

  <!-- アクセントドット（補間中間点） -->
  <circle cx="18" cy="34" r="1.8" fill="#ffd43b"/>
  <circle cx="38" cy="32" r="1.8" fill="#ffd43b"/>
</svg>
